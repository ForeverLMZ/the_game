<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Mixing Game - Analytics Edition</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(6, 60px);
            grid-template-rows: repeat(6, 60px);
            gap: 2px;
            background-color: #333;
            padding: 5px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .tile {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.5rem;
            box-sizing: border-box;
            border: 2px solid transparent;
        }

        .player {
            border: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        .goal {
            background-image: radial-gradient(circle, rgba(255,255,255,0.5) 20%, transparent 20%);
            background-size: 10px 10px;
        }

        #ui-panel {
            text-align: center;
            background: #222;
            padding: 15px;
            border-radius: 8px;
            width: 350px;
        }

        .color-box {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 1px solid #fff;
            vertical-align: middle;
            margin-left: 10px;
        }

        #message {
            margin-top: 10px;
            height: 20px;
            color: #ff5555;
            font-weight: bold;
        }
        
        .controls {
            margin-top: 20px;
            font-size: 0.9em;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-board" style="margin-top: 20px;"></div>

    <div id="ui-panel">
        <div><strong>Steps:</strong> <span id="steps-display">0</span> / 1500</div>
        <div style="margin-top: 10px;">
            <strong>Player Color:</strong> 
            <span id="player-color-box" class="color-box" style="background-color: black;"></span>
            (<span id="player-color-text">Black</span>)
        </div>
        <div id="message"></div>
    </div>

    <div class="controls">
        <p>Use <strong>Arrow Keys</strong> to move.</p>
        <p>Mix RGB to reach the bottom-right tile and turn it WHITE.</p>
        <button onclick="initGame()" style="margin-top:10px; padding: 5px 15px;">Restart Game</button>
        <p style="font-size: 0.8em; color: #888; margin-top: 15px;">(A replay log will automatically download upon win or timeout)</p>
    </div>

    <script>
        const GRID_SIZE = 6;
        const MAX_STEPS = 1500;
        
        // Colors mapping based on 3-bit RGB rule
        const COLORS = {
            "0,0,0": { name: "Black", hex: "#000000" },
            "1,0,0": { name: "Red", hex: "#ff0000" },
            "0,1,0": { name: "Green", hex: "#00ff00" },
            "0,0,1": { name: "Blue", hex: "#0000ff" },
            "1,1,0": { name: "Yellow", hex: "#ffff00" },
            "1,0,1": { name: "Magenta", hex: "#ff00ff" },
            "0,1,1": { name: "Cyan", hex: "#00ffff" },
            "1,1,1": { name: "White", hex: "#ffffff" }
        };

        const BASE_COLORS = [
            [1, 0, 0], // Red
            [0, 1, 0], // Green
            [0, 0, 1]  // Blue
        ];

        let grid = [];
        let px = 0, py = 0;
        let pc = [0, 0, 0];
        let steps = 0;
        let done = false;

        // Logging Variables
        let startTime;
        let overloads = 0;
        let trajectory = [];
        let initialSetup = {};

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initGame() {
            grid = Array.from({ length: GRID_SIZE }, () => Array.from({ length: GRID_SIZE }, () => [0, 0, 0]));
            px = 0;
            py = 0;
            pc = [0, 0, 0];
            steps = 0;
            done = false;
            
            // Reset logging state
            startTime = Date.now();
            overloads = 0;
            trajectory = [];

            document.getElementById('message').innerText = "";
            document.getElementById('message').style.color = "#ff5555";

            let avail = [];
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if ((x === 0 && y === 0) || (x === 5 && y === 5)) continue;
                    avail.push({x, y});
                }
            }

            shuffle(avail);

            // Mandatory one R, one G, one B
            let mandatory = [...BASE_COLORS];
            for (let i = 0; i < mandatory.length; i++) {
                let pos = avail[i];
                grid[pos.y][pos.x] = [...mandatory[i]];
            }

            // Scatter remaining with 25% chance of base color
            for (let i = mandatory.length; i < avail.length; i++) {
                if (Math.random() < 0.25) {
                    let pos = avail[i];
                    let randomBase = BASE_COLORS[Math.floor(Math.random() * BASE_COLORS.length)];
                    grid[pos.y][pos.x] = [...randomBase];
                }
            }

            // Save initial setup for the log
            initialSetup = { gridState: JSON.parse(JSON.stringify(grid)) };
            recordTrajectory();

            render();
        }

        function handleKeydown(e) {
            if (done) return;

            let dx = 0, dy = 0;
            if (e.key === "ArrowUp") dy = -1;
            else if (e.key === "ArrowDown") dy = 1;
            else if (e.key === "ArrowLeft") dx = -1;
            else if (e.key === "ArrowRight") dx = 1;
            else return;

            e.preventDefault();
            move(dx, dy);
        }

        function move(dx, dy) {
            steps++;
            let nx = px + dx;
            let ny = py + dy;

            // OOB attempt
            if (nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE) {
                recordTrajectory();
                render();
                checkTimeout();
                return;
            }

            px = nx;
            py = ny;

            let tileColor = grid[ny][nx];
            let mixed = [pc[0] + tileColor[0], pc[1] + tileColor[1], pc[2] + tileColor[2]];

            let overload = mixed[0] > 1 || mixed[1] > 1 || mixed[2] > 1;

            if (overload) {
                pc = [0, 0, 0];
                grid[ny][nx] = [0, 0, 0];
                overloads++;
                document.getElementById('message').innerText = "OVERLOAD! Colors destroyed.";
            } else {
                pc = [...mixed];
                grid[ny][nx] = [...mixed];
                document.getElementById('message').innerText = "";
            }

            recordTrajectory();
            render();

            // Check Win (Goal tile is White)
            if (grid[5][5].join(',') === "1,1,1") {
                done = true;
                let timeTaken = ((Date.now() - startTime) / 1000).toFixed(1);
                document.getElementById('message').innerText = `Game Complete! Play time: ${timeTaken} seconds`;
                document.getElementById('message').style.color = "#00ff00";
                endGame(true, timeTaken);
            } else {
                checkTimeout();
            }
        }

        function checkTimeout() {
            if (steps >= MAX_STEPS && !done) {
                done = true;
                let timeTaken = ((Date.now() - startTime) / 1000).toFixed(1);
                document.getElementById('message').innerText = `TIMED OUT! Play time: ${timeTaken} seconds`;
                endGame(false, timeTaken);
            }
        }

        // --- LOGGING & ANALYTICS FUNCTIONS ---

        function recordTrajectory() {
            trajectory.push({
                step: steps,
                x: px, 
                y: py, 
                pColor: [...pc]
            });
        }

        function generateLogText(isWin, timeTaken) {
            let log = "=== CHROMATIC WHITE - HUMAN EXPLORATION LOG ===\r\n\r\n";
            log += `[ METRICS ]\r\n`;
            log += `Result: ${isWin ? "SOLVED" : "TIMEOUT"}\r\n`;
            log += `Time Taken: ${timeTaken} seconds\r\n`;
            log += `Total Steps: ${steps}\r\n`;
            log += `Overload Triggers: ${overloads}\r\n\r\n`;
            
            log += "[ INITIAL MAP SEED ]\r\n";
            for (let y = 0; y < GRID_SIZE; y++) {
                let rowStr = "";
                for (let x = 0; x < GRID_SIZE; x++) {
                    let col = initialSetup.gridState[y][x].join(',');
                    if (col === '0,0,0') rowStr += ". ";
                    else if (col === '1,0,0') rowStr += "R ";
                    else if (col === '0,1,0') rowStr += "G ";
                    else if (col === '0,0,1') rowStr += "B ";
                    else rowStr += "? "; // Theoretically no mixed colors at start
                }
                log += rowStr + "\r\n";
            }
            log += "\r\n";

            log += "[ TRAJECTORY ]\r\n";
            trajectory.forEach((state) => {
                log += `Step ${state.step.toString().padStart(4, '0')}: Pos(${state.x.toString().padStart(2, ' ')}, ${state.y.toString().padStart(2, ' ')}), Color[${state.pColor.join(',')}]\r\n`;
            });
            
            log += "\r\n=== MACHINE READABLE REPLAY DATA (JSON) ===\r\n";
            const replayDataObj = {
                isWin: isWin,
                timeTaken: parseFloat(timeTaken),
                steps: steps,
                overloads: overloads,
                initialGrid: initialSetup.gridState,
                path: trajectory.map(t => ({ step: t.step, x: t.x, y: t.y, pColor: t.pColor }))
            };
            log += JSON.stringify(replayDataObj);
            
            return log;
        }

        function downloadLogFile(text) {
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = `human_eval_chromatic_white_${Date.now()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        function endGame(isWin, timeTaken) {
            const logData = generateLogText(isWin, timeTaken);
            downloadLogFile(logData);
        }

        // --- RENDERING ---

        function render() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';

            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    let tileData = grid[y][x];
                    let colorObj = COLORS[tileData.join(',')];
                    
                    let cell = document.createElement('div');
                    cell.className = 'tile';
                    cell.style.backgroundColor = colorObj.hex;

                    if (x === 5 && y === 5 && grid[5][5].join(',') !== "1,1,1") {
                        cell.classList.add('goal');
                    }

                    if (x === px && y === py) {
                        let pIndicator = document.createElement('div');
                        pIndicator.className = 'player';
                        let pColorObj = COLORS[pc.join(',')];
                        pIndicator.style.backgroundColor = pColorObj.hex;
                        cell.appendChild(pIndicator);
                    }

                    board.appendChild(cell);
                }
            }

            document.getElementById('steps-display').innerText = steps;
            
            let pColorData = COLORS[pc.join(',')];
            document.getElementById('player-color-box').style.backgroundColor = pColorData.hex;
            document.getElementById('player-color-text').innerText = pColorData.name;
        }

        window.addEventListener("keydown", handleKeydown);
        
        // Start game on load
        initGame();
    </script>
</body>
</html>
